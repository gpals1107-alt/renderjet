<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenderJet - Pro Video Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dual-panel-theme">
    <div class="ambient-glow purple"></div>
    <div class="ambient-glow green"></div>
    
    <!-- 언어 전환 토글 -->
    <div class="lang-selector">
        <button id="lang-ko" class="active">KR</button>
        <span class="sep">|</span>
        <button id="lang-en">EN</button>
    </div>

    <div class="app-wrap">
        <header class="header">
            <div class="brand-logo speed-mode">
                <span class="render">RENDER</span>
                <span class="jet-wrap">
                    <span class="jet">JET</span>
                    <span class="jet-trail">JET</span>
                    <span class="jet-trail-2">JET</span>
                </span>
                <div class="speed-lines"><span></span><span></span><span></span></div>
            </div>
            <p class="desc" data-i18n="slogan">PRO VIDEO COMPRESSION & INSTANT CLOUD DELIVERY</p>
        </header>

        <main class="dual-layout">
            <!-- 🌓 좌측: 소스 업로드 영역 -->
            <section class="panel side-left" id="drop-zone">
                <div class="panel-inner">
                    <div class="icon-orb">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 22V12m0 0l-4 4m4-4l4 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-14 0V6a2 2 0 012-2h10a2 2 0 012 2v2M5 8h14" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="source-info-wrap">
                        <h2 class="source-filename" id="display-filename" data-i18n="import-title">Import Master File</h2>
                        <p class="source-status" id="display-status" data-i18n="import-sub">Drag your 4K master (Max 2GB)</p>
                    </div>
                    <button class="select-btn" data-i18n="select-btn">SELECT FILE ▲</button>
                    <div class="secure-badge">
                        <span class="badge-icon">🛡️</span> FFMPEG_ENGINE_SECURE
                    </div>
                    <input type="file" id="file-input" accept="video/*" hidden>
                </div>
            </section>

            <!-- 🌓 우측: 설정 패널 -->
            <section class="panel side-right" id="right-panel">
                <div class="guide-box" id="guide-box">
                    <p data-i18n="guide-text">파일을 올리면 압축 설정을 시작할 수 있습니다.</p>
                </div>

                <div class="settings-content hidden" id="controls-panel">
                    <div class="tab-menu">
                        <button class="active" data-i18n="tab-basic">JET_BASIC</button>
                        <button data-i18n="tab-adv">ADVANCED</button>
                    </div>

                    <div class="setting-item">
                        <div class="label-row">
                            <label data-i18n="label-quality">JET_SPEED / QUALITY</label>
                            <span id="quality-badge" class="badge-v2">원본 무손실</span>
                        </div>
                        <div class="slider-field">
                            <input type="range" id="compression-slider" min="5" max="95" value="20" class="neon-slider">
                        </div>
                        <p id="quality-desc" class="q-desc" data-i18n="quality-desc-init">마스터 보관용 / 4K 화질 100% 보존</p>
                    </div>

                    <div class="estimate-preview-v2">
                        <div class="estimate-row">
                            <div class="estimate-col">
                                <span class="e-label" data-i18n="label-source">SOURCE</span>
                                <span id="original-size-display" class="e-val">-- MB</span>
                            </div>
                            <div class="estimate-sep"></div>
                            <div class="estimate-col highlight">
                                <span class="e-label" data-i18n="label-target">JET_TARGET</span>
                                <span id="estimated-size" class="e-val glow-text">-- MB</span>
                            </div>
                        </div>
                    </div>

                    <div class="action-footer">
                        <button class="action-btn-neon speed-btn" id="start-btn" data-i18n="btn-accel">JET_ACCELERATE 🚀</button>
                    </div>
                </div>

                <!-- 진행 상황 영역 -->
                <div class="progress-content hidden" id="status-panel">
                    <h3 class="status-title" data-i18n="status-title">ACCELERATING...</h3>
                    <div class="neon-bar-container">
                        <div class="neon-bar-fill" id="progress-bar"></div>
                    </div>
                    <div class="status-log" id="status-text" data-i18n="status-log">Optimizing packets for delivery...</div>

                    <div class="result-box hidden" id="result-link-container">
                        <div class="link-field-v3">
                            <input type="text" readonly id="result-link" value="https://renderjet.link/vh3k9d">
                            <button id="copy-btn" data-i18n="btn-copy">복사</button>
                        </div>
                        <div class="cloud-export-v2">
                            <label data-i18n="label-cloud">INSTANT CLOUD DELIVERY</label>
                            <div class="tile-grid">
                                <button class="cloud-tile">Google</button>
                                <button class="cloud-tile">Dropbox</button>
                                <button class="cloud-tile">MyBox</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
